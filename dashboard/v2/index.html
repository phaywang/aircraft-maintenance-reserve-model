<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aircraft Lessor Lifecycle Forecast</title>
  <meta name="description" content="Lessor maintenance reserve and lifecycle scenario forecast">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="../"><span>AL</span><strong>Aircraft Lifecycle<small>Lessor forecast</small></strong></a>
    <nav>
      <button class="active" data-view="setup">01 <span>Aircraft position</span></button>
      <button data-view="timeline">02 <span>Lease timeline</span></button>
      <button data-view="overview">03 <span>Forecast overview</span></button>
      <button data-view="funding">04 <span>Maintenance funding</span></button>
      <button data-view="reserves">05 <span>Reserve accounts</span></button>
      <button data-view="cashflow">06 <span>Reserve cash flow</span></button>
      <button data-view="comparison">07 <span>Scenario comparison</span></button>
      <button data-view="audit">08 <span>Model audit</span></button>
    </nav>
    <div class="version"><i></i><div><strong>Deterministic engine</strong><small>V2.1 · Lessor</small></div></div>
  </aside>
  <main>
    <header>
      <div><p class="eyebrow">Aircraft owner decision support</p><h1>Lifecycle forecast workspace</h1></div>
      <div class="header-actions"><a class="button secondary" href="../">Open V1 case model</a><button class="button secondary" id="duplicate-scenario">Duplicate scenario</button><button class="button primary" id="run">Run forecast</button></div>
    </header>
    <section class="context">
      <div><span>Active scenario</span><select id="scenario-picker"></select></div>
      <div><span>Analysis date</span><strong id="analysis-date">—</strong></div>
      <div><span>Forecast end</span><strong id="forecast-end">—</strong></div>
      <div><span>Perspective</span><strong>Lessor / aircraft owner</strong></div>
    </section>
    <div id="root"></div>
  </main>
  <div id="toast" role="status"></div>
  <script src="dashboard-data.js"></script><script src="app.js" defer></script>
</body>
</html>
