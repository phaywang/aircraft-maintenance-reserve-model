<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aircraft Maintenance Cash Flow Analysis</title>
    <meta name="description" content="Aircraft maintenance reserve cash-flow workspace">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="application-shell">
      <aside class="side-navigation">
        <div class="product-mark" aria-label="Aircraft Maintenance Cash Flow Analysis">
          <span class="mark-symbol">MC</span>
          <span><strong>Maintenance Cash Flow</strong><small>Analysis workspace</small></span>
        </div>
        <nav id="model-navigation" aria-label="Model sections">
          <p class="nav-label">Workspace</p>
          <button class="nav-item active" data-view="overview"><span class="nav-index">01</span>Overview</button>
          <button class="nav-item" data-view="assumptions"><span class="nav-index">02</span>Inputs &amp; Assumptions</button>
          <button class="nav-item" data-view="utilization"><span class="nav-index">03</span>Utilization</button>
          <button class="nav-item" data-view="events"><span class="nav-index">04</span>Maintenance Events</button>
          <button class="nav-item" data-view="inflows"><span class="nav-index">05</span>Reserve Inflow</button>
          <button class="nav-item" data-view="cashflow"><span class="nav-index">06</span>Event Settlement</button>
          <button class="nav-item" data-view="risk"><span class="nav-index">07</span>Reserve Adequacy</button>
          <button class="nav-item" data-view="audit"><span class="nav-index">08</span>Model Validation</button>
        </nav>
        <div class="model-version"><span class="status-dot"></span><div><strong id="model-state">Model validated</strong><span id="model-version">Stage 1–4 · v1.0.0-phase1</span></div></div>
      </aside>

      <main class="workspace">
        <header class="top-bar">
          <div><p class="eyebrow" id="case-context">Illustrative demonstration</p><h1 id="case-title">Illustrative Narrowbody · Demo Airline</h1></div>
          <div class="top-actions">
            <button class="button secondary" id="reset-case">Reset demo</button>
            <button class="button secondary" id="export-data">Export run</button>
            <button class="button primary" id="run-model">Run model</button>
          </div>
        </header>

        <section class="case-strip" aria-label="Case details">
          <div><span>Lease commencement</span><strong id="lease-start">—</strong></div>
          <div><span>Analysis date</span><strong id="analysis-date">—</strong></div>
          <div><span>Lease expiry</span><strong id="lease-expiry">—</strong></div>
          <div><span>Forecast</span><strong id="forecast-months">—</strong></div>
          <div class="validated-state"><span>Calculation state</span><strong id="calculation-state"><i></i> Validated</strong></div>
        </section>

        <div id="view-root" tabindex="-1"></div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="dashboard-data.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
